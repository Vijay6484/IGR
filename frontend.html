<!DOCTYPE html>
<html lang="en" class="">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mahasuchi - Maharashtra Digital Land Records</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0d1c32",
                        "primary-light": "#1e2e4a",
                        azure: "#3b82f6",
                        "institutional-navy": "#002147",
                        "institutional-azure": "#007FFF",
                        navy: {
                            900: '#0D1C32',
                            800: '#1A2B44',
                            700: '#263B5B',
                            950: '#0f172a',
                            DEFAULT: '#0D1C32'
                        },
                        vidhan: {
                            primary: "#0D1C32",
                            azure: "#F0F7FF"
                        }
                    },
                    fontFamily: {
                        sans: ["Inter", "Public Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .sleek-accent {
            position: relative;
            border-left: 3px solid #0D1C32 !important;
            border-radius: 0.5rem !important;
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 3s linear infinite;
        }
        body { min-height: max(884px, 100dvh); }
    </style>
</head>

<body class="bg-gray-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>

    <!-- React Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/history@5/umd/history.development.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { createRoot } = ReactDOM;
        const { MemoryRouter, Routes, Route, Link, useNavigate, useLocation, useSearchParams } = ReactRouterDOM;

        const API_BASE_URL = 'http://127.0.0.1:8000/api';

        // --- Shared Components ---
        const TopAppBar = () => {
            const navigate = useNavigate();
            return (
                <header className="fixed w-full top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200/60 dark:bg-slate-900/95 dark:border-slate-800">
                    <div className="flex flex-col items-center py-1.5 bg-primary">
                        <span className="text-[9px] font-bold text-white/70 uppercase tracking-[0.2em]">India's first AI-powered e-search</span>
                    </div>
                    <nav className="flex justify-between items-center px-5 py-3.5 max-w-7xl mx-auto">
                        <Link to="/" className="flex items-center gap-2.5">
                            <div className="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/10">
                                <span className="material-symbols-outlined text-white" style={{ fontSize: '22px' }}>account_balance</span>
                            </div>
                            <div className="flex flex-col">
                                <span className="text-lg font-extrabold tracking-tight text-primary dark:text-white leading-[1]">Mahasuchi</span>
                                <span className="text-[9px] font-bold text-azure uppercase tracking-wider leading-[1.2]">E-RECORDS</span>
                            </div>
                        </Link>
                        <div className="flex items-center gap-2">
                            <button className="flex items-center justify-center border border-slate-200 bg-white dark:bg-slate-800 dark:border-slate-700 rounded-full w-10 h-10 hover:bg-slate-50 transition-all shadow-sm">
                                <span className="material-symbols-outlined text-slate-600 dark:text-slate-400 text-[20px]">menu</span>
                            </button>
                        </div>
                    </nav>
                </header>
            );
        };

        const BottomNavBar = () => {
            const location = useLocation();
            const isActive = (path) => location.pathname === path;

            return (
                <nav className="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-safe bg-white dark:bg-slate-950 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
                    <Link to="/" className={`flex flex-col items-center justify-center transition-colors flex-1 ${isActive('/') ? 'text-azure' : 'text-slate-400'}`}>
                        <span className="material-symbols-outlined text-[24px]">home</span>
                        <span className="text-[9px] font-bold uppercase tracking-widest mt-1">Home</span>
                    </Link>
                    <Link to="/" className={`flex flex-col items-center justify-center transition-colors flex-1 ${isActive('/search') ? 'text-azure' : 'text-slate-400'}`}>
                        <span className="material-symbols-outlined text-[24px]">search</span>
                        <span className="text-[9px] font-bold uppercase tracking-widest mt-1">Search</span>
                    </Link>
                    <div className="flex flex-col items-center justify-center text-slate-400 flex-1">
                        <span className="material-symbols-outlined text-[24px]">verified_user</span>
                        <span className="text-[9px] font-bold uppercase tracking-widest mt-1">Verify</span>
                    </div>
                </nav>
            );
        }

        // --- Screen Components ---

        const HomePage = () => {
            const navigate = useNavigate();
            const [locationsData, setLocationsData] = useState({});
            
            const [selectedDistrict, setSelectedDistrict] = useState('');
            const [selectedTaluka, setSelectedTaluka] = useState('');
            const [selectedVillage, setSelectedVillage] = useState('');
            const [query, setQuery] = useState('');

            useEffect(() => {
                fetch(`${API_BASE_URL}/locations`)
                    .then(res => res.json())
                    .then(data => setLocationsData(data))
                    .catch(err => console.error("Error fetching locations:", err));
            }, []);

            const districts = Object.keys(locationsData);
            const talukas = selectedDistrict && locationsData[selectedDistrict] ? Object.keys(locationsData[selectedDistrict]) : [];
            const villages = selectedTaluka && locationsData[selectedDistrict][selectedTaluka] ? locationsData[selectedDistrict][selectedTaluka] : [];

            const handleSearch = (e) => {
                e.preventDefault();
                if(!selectedDistrict || !selectedTaluka || !selectedVillage || !query) {
                    alert("Please fill all fields.");
                    return;
                }
                const params = new URLSearchParams({
                    district: selectedDistrict,
                    taluka: selectedTaluka,
                    village: selectedVillage,
                    query: query
                });
                navigate(`/loading?${params.toString()}`);
            };

            const handleQueryChange = (e) => {
                const val = e.target.value;
                // Only allow numeric input
                if (val === '' || /^[0-9\b]+$/.test(val)) {
                    setQuery(val);
                }
            };

            return (
                <div className="min-h-screen">
                    <TopAppBar />
                    <main className="pt-[104px]">
                        <section className="px-5 py-12 flex flex-col items-center bg-gradient-to-b from-blue-50 to-white relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-blue-100/50 to-transparent pointer-events-none"></div>
                            <div className="w-full max-w-md bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-8 shadow-2xl shadow-blue-900/5 relative z-10">
                                <div className="flex flex-col items-center gap-2 mb-10 text-center">
                                    <div className="bg-blue-50 dark:bg-slate-800 p-2.5 rounded-full mb-2">
                                        <span className="material-symbols-outlined text-azure text-2xl font-bold">verified_user</span>
                                    </div>
                                    <h1 className="text-2xl font-extrabold text-primary dark:text-white tracking-tight">Digital E-Search Portal</h1>
                                    <p className="text-slate-500 text-sm">Secure verification of property records</p>
                                </div>
                                <form className="space-y-5" onSubmit={handleSearch}>
                                    <div className="space-y-1.5 group">
                                        <label className="block text-[10px] font-bold uppercase tracking-[0.1em] text-slate-400 px-1">District</label>
                                        <div className="relative transition-all sleek-accent bg-slate-50 dark:bg-slate-800">
                                            <select 
                                                className="w-full bg-transparent border-0 focus:ring-0 text-slate-700 dark:text-slate-200 font-medium text-sm py-3.5 px-5 appearance-none"
                                                value={selectedDistrict}
                                                onChange={(e) => { setSelectedDistrict(e.target.value); setSelectedTaluka(''); setSelectedVillage(''); }}
                                                required
                                            >
                                                <option value="">Select District</option>
                                                {districts.map(d => <option key={d} value={d}>{d}</option>)}
                                            </select>
                                            <div className="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
                                                <span className="material-symbols-outlined text-lg">expand_more</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1.5 group">
                                            <label className="block text-[10px] font-bold uppercase tracking-[0.1em] text-slate-400 px-1">Taluka</label>
                                            <div className="relative transition-all sleek-accent bg-slate-50 dark:bg-slate-800">
                                                <select 
                                                    className="w-full bg-transparent border-0 focus:ring-0 text-slate-700 dark:text-slate-200 font-medium text-sm py-3.5 px-4 appearance-none"
                                                    value={selectedTaluka}
                                                    onChange={(e) => { setSelectedTaluka(e.target.value); setSelectedVillage(''); }}
                                                    disabled={!selectedDistrict}
                                                    required
                                                >
                                                    <option value="">Select Taluka</option>
                                                    {talukas.map(t => <option key={t} value={t}>{t}</option>)}
                                                </select>
                                                <div className="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
                                                    <span className="material-symbols-outlined text-lg">expand_more</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="space-y-1.5 group">
                                            <label className="block text-[10px] font-bold uppercase tracking-[0.1em] text-slate-400 px-1">Village</label>
                                            <div className="relative transition-all sleek-accent bg-slate-50 dark:bg-slate-800">
                                                <select 
                                                    className="w-full bg-transparent border-0 focus:ring-0 text-slate-700 dark:text-slate-200 font-medium text-sm py-3.5 px-4 appearance-none"
                                                    value={selectedVillage}
                                                    onChange={(e) => setSelectedVillage(e.target.value)}
                                                    disabled={!selectedTaluka}
                                                    required
                                                >
                                                    <option value="">Select Village</option>
                                                    {villages.map(v => <option key={v} value={v}>{v}</option>)}
                                                </select>
                                                <div className="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
                                                    <span className="material-symbols-outlined text-lg">expand_more</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-1.5 group">
                                        <label className="block text-[10px] font-bold uppercase tracking-[0.1em] text-slate-400 px-1">Property Number (Numeric only)</label>
                                        <div className="relative transition-all sleek-accent bg-slate-50 dark:bg-slate-800">
                                            <input 
                                                className="w-full bg-transparent border-0 focus:ring-0 text-slate-700 dark:text-slate-200 font-medium text-sm py-3.5 px-5 pr-10 outline-none" 
                                                placeholder="Enter Property Number (e.g. 128)" 
                                                required 
                                                type="text" 
                                                value={query}
                                                onChange={handleQueryChange}
                                            />
                                            <div className="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400">
                                                <span className="material-symbols-outlined text-xl">search</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-3 pt-2">
                                        <div className="flex items-start gap-3 px-1">
                                            <input id="accept-terms" type="checkbox" required className="mt-0.5 w-4 h-4 rounded border-slate-300 text-azure focus:ring-azure cursor-pointer" />
                                            <label htmlFor="accept-terms" className="text-[11px] text-slate-500 leading-tight cursor-pointer">
                                                I confirm that I am searching for records for lawful purposes.
                                            </label>
                                        </div>
                                    </div>
                                    <div className="pt-4">
                                        <button className="w-full bg-primary hover:bg-primary-light text-white font-bold py-4 rounded-xl shadow-xl shadow-primary/20 transition-all active:scale-[0.98] text-xs uppercase tracking-[0.15em] flex items-center justify-center gap-2.5" type="submit">
                                            <span className="material-symbols-outlined text-[18px]">security</span>
                                            Verify Property Records
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </section>
                    </main>
                    <footer className="bg-primary text-white pt-16 pb-24 px-6 text-center">
                        <div className="max-w-7xl mx-auto flex flex-col items-center">
                            <div className="mb-10">
                                <div className="flex items-center justify-center gap-2 mb-3">
                                    <div className="w-8 h-8 bg-azure rounded-lg flex items-center justify-center">
                                        <span className="material-symbols-outlined text-white text-sm">account_balance</span>
                                    </div>
                                    <span className="font-extrabold text-xl tracking-tight">Mahasuchi</span>
                                </div>
                                <p className="text-slate-400 text-xs mt-2 max-w-[280px] mx-auto leading-relaxed">Providing a sovereign digital foundation for land administration in Maharashtra.</p>
                            </div>
                            <div className="pt-8 border-t border-white/10 w-full">
                                <p className="text-[10px] text-slate-500 uppercase tracking-[0.2em] leading-loose">
                                    © 2026 We make your property experience<br />
                                    <span className="text-white font-black">SUPER FAST</span>
                                </p>
                            </div>
                        </div>
                    </footer>
                    <BottomNavBar />
                </div>
            );
        };

        const LoadingPage = () => {
            const navigate = useNavigate();
            const location = useLocation();

            useEffect(() => {
                const timer = setTimeout(() => {
                    navigate(`/results${location.search}`);
                }, 2000);
                return () => clearTimeout(timer);
            }, [navigate, location]);

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-950 flex items-center justify-center p-4">
                    <div className="bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl w-full max-w-sm rounded-[2.5rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.3)] border border-slate-100 p-12 flex flex-col items-center">
                        <div className="relative mb-10 w-[89.6px] h-[89.6px]">
                            <div className="absolute -inset-2 bg-blue-500/10 rounded-full blur-xl animate-pulse"></div>
                            <div className="absolute inset-0 border-[3px] border-blue-50 rounded-full"></div>
                            <div className="absolute inset-0 border-[3px] border-t-blue-800 border-r-blue-400 border-b-transparent border-l-transparent rounded-full animate-spin"></div>
                            <div className="absolute inset-2 border-[1.5px] border-blue-100 border-l-blue-400 border-b-transparent border-t-transparent border-r-transparent rounded-full animate-spin-slow"></div>
                            <div className="absolute inset-0 flex items-center justify-center">
                                <span className="material-symbols-outlined text-blue-900/30 font-light text-[28.8px]">travel_explore</span>
                            </div>
                        </div>
                        <div className="text-center space-y-6">
                            <div className="space-y-1">
                                <h2 className="text-2xl font-extrabold text-slate-900 tracking-tight">Finding your records</h2>
                                <div className="flex justify-center">
                                    <div className="h-1 w-8 bg-blue-600 rounded-full"></div>
                                </div>
                            </div>
                            <p className="text-slate-500 text-sm leading-relaxed px-2 font-medium">
                                Accessing the secure <span className="text-slate-800 font-semibold">MAHASUCHI</span> <br />Records Database
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const ResultsPage = () => {
            const navigate = useNavigate();
            const [searchParams] = useSearchParams();
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const district = searchParams.get('district');
            const taluka = searchParams.get('taluka');
            const village = searchParams.get('village');
            const query = searchParams.get('query');

            useEffect(() => {
                fetch(`${API_BASE_URL}/search? district=${encodeURIComponent(district)}&taluka=${encodeURIComponent(taluka)}&village=${encodeURIComponent(village)}&query=${encodeURIComponent(query)}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) {
                            setError(data.error);
                        } else {
                            // Sort by doc_id loosely if available
                            setRecords(data.results || []);
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setError("Failed to fetch records");
                        setLoading(false);
                    });
            }, [district, taluka, village, query]);

            return (
                <div className="min-h-screen bg-slate-100/60 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-white dark:bg-slate-900 w-full max-w-md rounded-[2rem] shadow-2xl overflow-hidden flex flex-col border border-slate-200">
                        <div className="bg-gradient-to-b from-blue-50 to-white px-6 pt-8 pb-6 text-center sticky top-0 z-10 border-b border-slate-100">
                            <div className="inline-flex items-center justify-center w-14 h-14 bg-blue-600 text-white rounded-2xl mb-4 shadow-lg">
                                <span className="material-symbols-outlined text-2xl" style={{ fontVariationSettings: '"FILL" 1' }}>folder_managed</span>
                            </div>
                            <h2 className="text-2xl font-extrabold text-slate-900 tracking-tight">
                                {loading ? "Loading..." : `${records.length} Records Found`}
                            </h2>
                            <p className="text-[13px] font-semibold text-blue-600 uppercase tracking-widest mt-1">
                                {district} • {taluka} • {village}
                            </p>
                        </div>
                        
                        <div className="px-5 space-y-4 overflow-y-auto max-h-[500px] py-4 bg-slate-50">
                            {loading && <p className="text-center text-slate-500">Fetching property documents...</p>}
                            {error && <p className="text-center text-red-500 font-semibold">{error}</p>}
                            {!loading && !error && records.length === 0 && (
                                <p className="text-center text-slate-500">No records matched Property Number: {query}</p>
                            )}

                            {records.map((record, i) => (
                                <div key={i} className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm border-l-[6px] border-l-blue-800">
                                    <div className="flex items-center gap-4 mb-4">
                                        <div className="flex-1 min-w-0">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5 block">Document Type</span>
                                            <span className="text-[15px] font-bold text-slate-900 truncate block">{record.document_type || 'Unknown'}</span>
                                            
                                            <div className="mt-3 grid grid-cols-2 gap-4">
                                                <div className="flex flex-col">
                                                    <span className="text-[9px] font-bold text-slate-400 uppercase">Doc No.</span>
                                                    <span className="text-[13px] font-bold text-slate-900">{record.document_number}</span>
                                                </div>
                                                <div className="flex flex-col">
                                                    <span className="text-[9px] font-bold text-slate-400 uppercase">Reg. Date</span>
                                                    <span className="text-[13px] font-bold text-slate-900">{record.date}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="text-xs text-slate-600 line-clamp-2 italic mb-4 bg-slate-50 p-2 rounded-lg">
                                        {record.text}
                                    </div>
                                    {record.pdf_link && (
                                        <a href={record.pdf_link} target="_blank" rel="noopener noreferrer" 
                                           className="w-full bg-blue-50 text-blue-700 hover:bg-blue-100 font-bold py-2.5 px-4 rounded-xl transition-all flex justify-center items-center gap-2 text-xs uppercase tracking-wide">
                                            <span className="material-symbols-outlined text-[16px]">picture_as_pdf</span>
                                            View Official PDF
                                        </a>
                                    )}
                                </div>
                            ))}
                        </div>
                        <div className="p-6 pt-4 bg-white border-t border-slate-100">
                            <button onClick={() => navigate('/')} className="w-full text-slate-500 hover:text-slate-700 text-sm font-bold transition-colors py-3 uppercase tracking-wide bg-slate-100 rounded-xl">
                                Search New Property
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <MemoryRouter>
                    <Routes>
                        <Route path="/" element={<HomePage />} />
                        <Route path="/loading" element={<LoadingPage />} />
                        <Route path="/results" element={<ResultsPage />} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
